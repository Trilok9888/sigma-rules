title: Esxi Sensitive Files Accessed
id: esxi-sensitive-files-accessed
status: experimental
description: |
  Detects esxi sensitive files accessed activity which may indicate malicious behavior.
  Category: Email_Security | Source: splunk
references:
- https://sigmahq.io/docs/basics/rules.html
- https://attack.mitre.org/
author: REVSOC
date: 20/10/2025
tags:
- attack.initial_access
- attack.t1190
logsource:
  product: email
  service: gateway
  definition: Detects Esxi Sensitive Files Accessed based on the configured Sigma detection logic.
detection:
  selection:
    eventSource: email.service
    eventName: EsxiSensitiveFilesAccessed
  condition: selection
falsepositives:
- Legitimate administrative activity
- Authorized security testing
- Known good software behavior
level: medium
