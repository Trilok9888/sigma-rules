title: Proc Creation Macos Tail Base64 Decode From Image
id: proc-creation-macos-tail-base64-decode-from-image
status: experimental
description: |
  Detects proc creation macos tail base64 decode from image activity which may indicate malicious behavior.
  Category: macOS_Endpoints | Source: sigmaHQ
references:
- https://sigmahq.io/docs/basics/rules.html
- https://attack.mitre.org/
author: REVSOC
date: 20/10/2025
tags:
- attack.discovery
logsource:
  product: macos
  service: process_creation
  definition: Detects Proc Creation Macos Tail Base64 Decode From Image based on the configured Sigma detection logic.
detection:
  selection:
    eventSource: macos.service
    eventName: ProcCreationMacosTailBase64DecodeFromImage
  condition: selection
falsepositives:
- Legitimate administrative activity
- Authorized security testing
- Known good software behavior
level: medium
