title: Okta Api Token Revoked
id: okta-api-token-revoked
status: experimental
description: |
  Detects okta api token revoked activity which may indicate malicious behavior.
  Category: Okta | Source: sigmaHQ
references:
- https://sigmahq.io/docs/basics/rules.html
- https://attack.mitre.org/
author: REVSOC
date: 20/10/2025
tags:
- attack.privilege_escalation
- attack.t1068
logsource:
  product: okta
  service: system
  definition: Detects Okta Api Token Revoked based on the configured Sigma detection logic.
detection:
  selection:
    eventSource: okta.service
    eventName: OktaApiTokenRevoked
  condition: selection
falsepositives:
- Legitimate administrative activity
- Authorized security testing
- Known good software behavior
level: medium
