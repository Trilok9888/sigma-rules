title: Aws Cloudtrail Console Login Success Without Mfa
id: aws-cloudtrail-console-login-success-without-mfa
status: experimental
description: |
  Detects aws cloudtrail console login success without mfa activity which may indicate malicious behavior.
  Category: AWS_CloudFront | Source: sigmaHQ
references:
- https://sigmahq.io/docs/basics/rules.html
- https://attack.mitre.org/
author: REVSOC
date: 20/10/2025
tags:
- attack.discovery
logsource:
  product: aws
  service: cloudtrail
  definition: Detects Aws Cloudtrail Console Login Success Without Mfa based on the configured Sigma detection logic.
detection:
  selection:
    eventSource: cloudtrail.amazonaws.com
    eventName: AwsCloudtrailConsoleLoginSuccessWithoutMfa
  condition: selection
falsepositives:
- Legitimate administrative activity
- Authorized security testing
- Known good software behavior
level: medium
