title: Aws Iam S3browser User Or Accesskey Creation
id: aws-iam-s3browser-user-or-accesskey-creation
status: experimental
description: |
  Detects aws iam s3browser user or accesskey creation activity which may indicate malicious behavior.
  Category: AWS_CloudFront | Source: sigmaHQ
references:
- https://sigmahq.io/docs/basics/rules.html
- https://attack.mitre.org/
author: REVSOC
date: 20/10/2025
tags:
- attack.initial_access
- attack.t1190
logsource:
  product: aws
  service: cloudtrail
  definition: Detects Aws Iam S3browser User Or Accesskey Creation based on the configured Sigma detection logic.
detection:
  selection:
    eventSource: cloudtrail.amazonaws.com
    eventName: AwsIamS3browserUserOrAccesskeyCreation
  condition: selection
falsepositives:
- Legitimate administrative activity
- Authorized security testing
- Known good software behavior
level: medium
