title: Cisco Duo Policy Allow Devices Without Screen Lock
id: cisco-duo-policy-allow-devices-without-screen-lock
status: experimental
description: |
  Detects cisco duo policy allow devices without screen lock activity which may indicate malicious behavior.
  Category: Cisco_Devices | Source: splunk
references:
- https://sigmahq.io/docs/basics/rules.html
- https://attack.mitre.org/
author: REVSOC
date: 20/10/2025
tags:
- attack.discovery
logsource:
  product: cisco
  service: firewall
  definition: Detects Cisco Duo Policy Allow Devices Without Screen Lock based on the configured Sigma detection logic.
detection:
  selection:
    eventSource: cisco.service
    eventName: CiscoDuoPolicyAllowDevicesWithoutScreenLock
  condition: selection
falsepositives:
- Legitimate administrative activity
- Authorized security testing
- Known good software behavior
level: medium
