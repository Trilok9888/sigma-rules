title: Load Of Rstrtmgrdll By A Suspicious Process
id: load-of-rstrtmgrdll-by-a-suspicious-process
status: experimental
description: |
  Detects load of rstrtmgrdll by a suspicious process activity which may indicate malicious behavior.
  Category: PRODUCTION_READY_ELITE | Source: Windows_Endpoints
references:
- https://sigmahq.io/docs/basics/rules.html
- https://attack.mitre.org/
author: REVSOC
date: 20/10/2025
tags:
- attack.discovery
logsource:
  product: generic
  service: audit
  definition: Detects Load Of Rstrtmgrdll By A Suspicious Process based on the configured Sigma detection logic.
detection:
  selection:
    eventSource: generic.service
    eventName: LoadOfRstrtmgrdllByASuspiciousProcess
  condition: selection
falsepositives:
- Legitimate administrative activity
- Authorized security testing
- Known good software behavior
level: medium
