title: Malicious Usage Of Imds Credentials Outside Of Aws Infrastructure
id: malicious-usage-of-imds-credentials-outside-of-aws-infrastructure
status: experimental
description: |
  Detects malicious usage of imds credentials outside of aws infrastructure activity which may indicate malicious behavior.
  Category: PRODUCTION_READY_ELITE | Source: Wiz
references:
- https://sigmahq.io/docs/basics/rules.html
- https://attack.mitre.org/
author: REVSOC
date: 20/10/2025
tags:
- attack.credential_access
- attack.t1003
logsource:
  product: generic
  service: audit
  definition: Detects Malicious Usage Of Imds Credentials Outside Of Aws Infrastructure based on the configured Sigma detection logic.
detection:
  selection:
    eventSource: generic.service
    eventName: MaliciousUsageOfImdsCredentialsOutsideOfAwsInfrastructure
  condition: selection
falsepositives:
- Legitimate administrative activity
- Authorized security testing
- Known good software behavior
level: medium
