title: User Shell Folders Registry Modification Via Commandline
id: user-shell-folders-registry-modification-via-commandline
status: experimental
description: |
  Detects user shell folders registry modification via commandline activity which may indicate malicious behavior.
  Category: PRODUCTION_READY_ELITE | Source: Windows_Endpoints
references:
- https://sigmahq.io/docs/basics/rules.html
- https://attack.mitre.org/
author: REVSOC
date: 20/10/2025
tags:
- attack.persistence
- attack.t1547
logsource:
  product: generic
  service: audit
  definition: Detects User Shell Folders Registry Modification Via Commandline based on the configured Sigma detection logic.
detection:
  selection:
    eventSource: generic.service
    eventName: UserShellFoldersRegistryModificationViaCommandline
  condition: selection
falsepositives:
- Legitimate administrative activity
- Authorized security testing
- Known good software behavior
level: medium
