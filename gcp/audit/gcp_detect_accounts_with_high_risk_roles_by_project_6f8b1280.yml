title: Gcp Detect Accounts With High Risk Roles By Project
id: gcp-detect-accounts-with-high-risk-roles-by-project
status: experimental
description: |
  Detects gcp detect accounts with high risk roles by project activity which may indicate malicious behavior.
  Category: GCP_Core_Services | Source: splunk
references:
- https://sigmahq.io/docs/basics/rules.html
- https://attack.mitre.org/
author: REVSOC
date: 20/10/2025
tags:
- attack.discovery
logsource:
  product: gcp
  service: audit
  definition: Detects Gcp Detect Accounts With High Risk Roles By Project based on the configured Sigma detection logic.
detection:
  selection:
    eventSource: gcp.audit
    eventName: GcpDetectAccountsWithHighRiskRolesByProject
  condition: selection
falsepositives:
- Legitimate administrative activity
- Authorized security testing
- Known good software behavior
level: medium
