title: Net Connection Lnx Crypto Mining Indicators
id: net-connection-lnx-crypto-mining-indicators
status: experimental
description: |
  Detects net connection lnx crypto mining indicators activity which may indicate malicious behavior.
  Category: Linux_Endpoints | Source: sigmaHQ
references:
- https://sigmahq.io/docs/basics/rules.html
- https://attack.mitre.org/
author: REVSOC
date: 20/10/2025
tags:
- attack.discovery
logsource:
  product: linux
  service: syslog
  definition: Detects Net Connection Lnx Crypto Mining Indicators based on the configured Sigma detection logic.
detection:
  selection:
    eventSource: syslog
    eventName: NetConnectionLnxCryptoMiningIndicators
  condition: selection
falsepositives:
- Legitimate administrative activity
- Authorized security testing
- Known good software behavior
level: medium
